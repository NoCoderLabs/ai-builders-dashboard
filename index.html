<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Builders Dashboard — Lead with AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #0d1117;
      --bg-2:           #161b22;
      --surface:        #1c2128;
      --surface-2:      #22272e;
      --border:         #30363d;
      --border-subtle:  #21262d;
      --text-primary:   #e6edf3;
      --text-secondary: #8b949e;
      --text-tertiary:  #6e7681;
      --accent:         #58a6ff;
      --accent-bg:      #1c2a3a;
      --accent-border:  #1f4878;
      --radius-sm: 6px;
      --radius-md: 10px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
    }

    html { font-size: 15px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 28px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .brand-logo svg {
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 20px;
      font-weight: 700;
      color: #a0a8b0;
      letter-spacing: -0.01em;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .header-subtitle {
      font-size: 13px;
      color: var(--text-tertiary);
      letter-spacing: 0.02em;
      padding-left: 42px;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-left: auto;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ─── CONTAINER ─── */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 28px;
    }

    /* ─── METRICS ROW ─── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }

    .metric-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-tertiary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .metric-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 4px;
    }

    .metric-sub {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* ─── SECTION HEADER ─── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin: 28px 0 16px 0;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .section-subtitle {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-left: 8px;
      font-weight: 400;
    }

    /* ─── STAGE BADGE ─── */
    .stage-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      border: 1px solid;
    }

    .stage-badge.ideation {
      background: #1e1527;
      border-color: #3b2a5a;
      color: #a78bfa;
    }

    .stage-badge.drafting {
      background: #0f2139;
      border-color: #1a3a6b;
      color: #60a5fa;
    }

    .stage-badge.testing {
      background: #2d1f00;
      border-color: #5a3d00;
      color: #fbbf24;
    }


    .stage-badge.launched {
      background: #0a2218;
      border-color: #1a5c3a;
      color: #34d399;
    }

    /* ─── 3-MONTH ROADMAP ─── */
    .roadmap-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 28px;
      overflow-x: auto;
    }

    .roadmap-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text-primary);
    }

    .roadmap-timeline {
      width: 100%;
    }

    .today-bar {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(255, 255, 255, 0.55);
      border-radius: 1px;
      z-index: 5;
      pointer-events: none;
    }

    .today-label {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .roadmap-chart {
      flex: 1;
      position: relative;
    }

    .timeline-header {
      display: flex;
      position: relative;
      height: 36px;
      margin-bottom: 16px;
      align-items: flex-end;
    }

    .timeline-marker {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .week-col-header {
      position: absolute;
      top: 0;
      font-size: 9px;
      font-weight: 600;
      color: rgba(139,148,158,0.45);
      text-align: center;
      letter-spacing: 0.02em;
      transform: translateX(-50%);
      user-select: none;
    }

    .week-divider {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255,255,255,0.06);
      pointer-events: none;
      z-index: 1;
    }

    .roadmap-dot-wrap {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
    }

    .roadmap-dot-wrap:hover .dot-tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(-2px);
      pointer-events: none;
    }

    .dot-tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: #1c2128;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 6px 10px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.15s ease, transform 0.15s ease;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 20;
    }

    .dot-tooltip-name {
      font-size: 11px;
      font-weight: 600;
      color: #e6edf3;
      display: block;
    }

    .dot-tooltip-stage {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 2px;
      display: block;
    }

    .timeline-grid {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .timeline-row {
      display: flex;
      align-items: center;
      position: relative;
      height: 28px;
    }

    .timeline-person {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 100px;
      padding-right: 12px;
    }

    .roadmap-avatar {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      background: var(--accent);
    }

    .roadmap-person-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      min-width: fit-content;
    }

    .timeline-track {
      position: relative;
      flex: 1;
      height: 28px;
      background: rgba(48, 54, 61, 0.4);
      border-radius: 4px;
      border: 1px solid var(--border);
      overflow: visible;
    }

    .roadmap-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid;
      flex-shrink: 0;
    }

    /* ─── PEOPLE GRID ─── */
    .people-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .person-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .person-card:hover {
      border-color: var(--text-tertiary);
      box-shadow: var(--shadow-md);
    }

    .person-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }

    .person-avatar {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .person-meta {
      flex: 1;
      min-width: 0;
    }

    .person-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      display: block;
      margin-bottom: 2px;
    }

    .person-stats {
      font-size: 10px;
      color: var(--text-tertiary);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .agents-list {
      display: flex;
      flex-direction: column;
      max-height: 400px;
      overflow-y: auto;
    }

    .agent-item {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background 0.15s;
    }

    .agent-item:last-child {
      border-bottom: none;
    }

    .agent-item:hover {
      background: rgba(88, 166, 255, 0.08);
    }

    .agent-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .agent-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-primary);
      flex: 1;
    }

    .agent-desc {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .agent-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .agent-timeline {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }

    .agent-timeline-bar {
      height: 100%;
      border-radius: 1px;
    }

    /* ─── PIPELINE VISUALIZER ─── */
    .pipeline-track {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0;
    }

    .pipe-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
      flex: 0 0 auto;
    }

    .pipe-step-icon {
      font-size: 20px;
      height: 24px;
      display: flex;
      align-items: center;
    }

    .pipe-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: white;
      background: var(--border);
      border-color: var(--border);
      transition: all 0.3s ease;
    }

    .pipe-dot.done {
      background: currentColor;
      border-color: currentColor;
    }

    .pipe-dot.done::after {
      content: '✓';
    }

    .pipe-dot.current {
      width: 20px;
      height: 20px;
      animation: pipePulse 1.5s ease-in-out infinite;
      background: currentColor;
      border-color: currentColor;
    }

    @keyframes pipePulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.7; }
    }

    .pipe-label {
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
      color: var(--text-secondary);
      min-width: 70px;
    }

    .pipe-label.current {
      color: currentColor;
      font-weight: 700;
    }

    .pipe-label.future {
      color: var(--text-tertiary);
    }

    .pipe-connector {
      width: 32px;
      height: 2px;
      background: var(--border);
      flex: 0 0 auto;
      transition: background 0.3s ease;
    }

    .pipe-connector.done {
      background: currentColor;
    }

    .pipe-sub-drafts {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .pipe-draft-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: default;
    }

    .pipe-draft-circle {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .pipe-draft-circle.active {
      background: currentColor;
      border-color: currentColor;
    }

    /* ─── MODAL ─── */
    .modal-backdrop {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title-section {
      flex: 1;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .modal-person {
      font-size: 11px;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modal-person-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .timeline-section {
      margin-top: 20px;
    }

    .timeline-section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-tertiary);
      margin-bottom: 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .timeline-item {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .timeline-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .timeline-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .slack-avatar {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      background: var(--accent);
    }

    .slack-author-meta {
      flex: 1;
      min-width: 0;
    }

    .slack-author-name {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-primary);
      display: block;
      margin-bottom: 2px;
    }

    .slack-date {
      font-size: 10px;
      color: var(--text-tertiary);
    }

    .slack-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--bg-2);
      border-left: 3px solid var(--accent-border);
      padding: 8px;
      border-radius: 2px;
      margin-bottom: 8px;
    }

    .slack-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
    }

    .slack-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .slack-link:hover {
      color: #90bcf7;
    }

    .slack-attachment {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text-tertiary);
      font-size: 10px;
    }

    /* ─── FILE ATTACHMENT CARDS ─── */
    .file-attachment {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-sm);
      margin-top: 8px;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }

    .file-attachment:hover {
      background: #1e3652;
      border-color: var(--accent);
    }

    .file-icon {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .file-icon.video { background: #2d2008; }
    .file-icon.image { background: #0d2b1a; }

    .file-meta { flex: 1; min-width: 0; }

    .file-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .file-info {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .file-open-btn {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .empty-message {
      text-align: center;
      padding: 16px;
      color: var(--text-tertiary);
      font-size: 12px;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      line-height: 1.5;
    }

    /* ─── SCROLLBAR ─── */
    .card-body::-webkit-scrollbar,
    .modal::-webkit-scrollbar,
    .agents-list::-webkit-scrollbar {
      width: 6px;
    }

    .card-body::-webkit-scrollbar-track,
    .modal::-webkit-scrollbar-track,
    .agents-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .card-body::-webkit-scrollbar-thumb,
    .modal::-webkit-scrollbar-thumb,
    .agents-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .card-body::-webkit-scrollbar-thumb:hover,
    .modal::-webkit-scrollbar-thumb:hover,
    .agents-list::-webkit-scrollbar-thumb:hover {
      background: var(--text-tertiary);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        align-items: flex-start;
      }

      .header-meta {
        margin-left: 0;

  const stageConfig = {
    ideation: { icon: '💡', label: 'Ideation', color: '#a78bfa', bgColor: '#1e1527', borderColor: '#3b2a5a' },
    drafting: { icon: '✏️', label: 'Drafting', color: '#60a5fa', bgColor: '#0f2139', borderColor: '#1a3a6b' },
    testing: { icon: '🧪', label: 'Testing', color: '#fbbf24', bgColor: '#2d1f00', borderColor: '#5a3d00' },
    launched: { icon: '🚀', label: 'Launched', color: '#34d399', bgColor: '#0a2218', borderColor: '#1a5c3a' }
  };

  const stages = ['ideation', 'drafting', 'testing', 'launched'];

  function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.replace(/[&<>"']/g, m => map[m]);
  }

  function formatDate(dateStr) { return dateStr; }

  function getInitials(name) { return name.split(' ').map(n => n[0]).join('').toUpperCase(); }

  function getStageColor(stage) { return stageConfig[stage]?.color || '#666'; }

  function getStageIcon(stage) { return stageConfig[stage]?.icon || '?'; }

  function renderStageBadge(stage, draft) {
   const config = stageConfig[stage];
    if (!config) return '';
    let label = config.label;
    if (stage === 'drafting' && draft) label = `Draft ${draft}`;
    return `<span class="stage-badge ${stage}">${config.icon} ${label}</span>`;
  }

  function renderPipelineTrack(stage, draft) {
    let html = '<div class="pipeline-track">';
    stages.forEach((s, idx) => {
      const config = stageConfig[s];
      const isDone = stages.indexOf(s) < stages.indexOf(stage);
      const isCurrent = s === stage;
      html += `<div class="pipe-step">
        <div class="pipe-step-icon">${config.icon}</div>
        <div class="pipe-dot ${isDone ? 'done' : ''} ${isCurrent ? 'current' : ''}" style="color: ${config.color};"></div>
        <div class="pipe-label ${isCurrent ? 'current' : isDone ? 'done' : 'future'}" style="${isCurrent ? `color: ${config.color};` : ''}">${config.label}</div>
      </div>`;
      if (idx < stages.length - 1) {
        const nextDone = stages.indexOf(stages[idx + 1]) < stages.indexOf(stage);
        html += `<div class="pipe-connector ${nextDone ? 'done' : ''}" style="${nextDone ? `background: ${getStageColor(stage)};` : ''}"></div>`;
      }
    });
    if (stage === 'drafting') {
      html += `<div class="pipe-sub-drafts">
        <div class="pipe-draft-dot"><div class="pipe-draft-circle ${draft === 1 ? 'active' : ''}" style="${draft === 1 ? `background: ${stageConfig.drafting.color}; border-color: ${stageConfig.drafting.color};` : ''}"></div><span>Draft 1</span></div>
        <div class="pipe-draft-dot"><div class="pipe-draft-circle ${draft === 2 ? 'active' : ''}" style="${draft === 2 ? `background: ${stageConfig.drafting.color}; border-color: ${stageConfig.drafting.color};` : ''}"></div><span>Draft 2</span></div>
        <div class="pipe-draft-dot"><div class="pipe-draft-circle ${draft === 3 ? 'active' : ''}" style="${draft === 3 ? `background: ${stageConfig.drafting.color}; border-color: ${stageConfig.drafting.color};` : ''}"></div><span>Draft 3</span></div>
      </div>`;
    }
    html += '</div>';
    return html;
  }

  function renderAgentCard(agent, person, color) {
    const timelineProgress = getTimelineProgress(agent.stage);
    return `<div class="agent-item" onclick="openModal('${escapeHtml(agent.name)}', '${person}', '${color}', ${JSON.stringify(agent).replace(/"/g, '&quot;')})">
      <div class="agent-header">
        <span class="agent-name">${escapeHtml(agent.name)}</span>
        ${renderStageBadge(agent.stage, agent.draft)}
      </div>
      <div class="agent-desc">${escapeHtml(agent.desc)}</div>
      <div class="agent-footer">
        <div class="agent-timeline">
          <div class="agent-timeline-bar" style="width: ${timelineProgress}%; background: ${getStageColor(agent.stage)};"></div>
        </div>
      </div>
    </div>`;
  }

  function getTimelineProgress(stage) {
    const stageIndex = stages.indexOf(stage);
    return stageIndex >= 0 ? ((stageIndex + 1) / stages.length) * 100 : 0;
  }

  function renderPersonCard(personData) {
    const initials = getInitials(personData.person);
    const ideationCount = personData.agents.filter(a => a.stage === 'ideation').length;
    const buildingCount = personData.agents.filter(a => ['drafting', 'testing'].includes(a.stage)).length;
    const launchedCount = personData.agents.filter(a => a.stage === 'launched').length;
    return `<div class="person-card">
      <div class="person-header">
        <div class="person-avatar" style="background: ${personData.color};">${initials}</div>
        <div class="person-meta">
          <span class="person-name">${escapeHtml(personData.person)}</span>
          <div class="person-stats">
            <span>${ideationCount} ideation</span>
            <span>·</span>
            <span>${buildingCount} building</span>
            <span>·</span>
            <span>${launchedCount} done</span>
          </div>
        </div>
      </div>
      <div class="agents-list">
        ${personData.agents.map(agent => renderAgentCard(agent, personData.person, personData.color)).join('')}
      </div>
    </div>`;
  }

  function renderRoadmapChart() {
    const totalWeeks = 13;
    const weekLabels = ['Apr 2','Apr 9','Apr 16','Apr 23','Apr 30','May 7','May 14','May 21','May 28','Jun 4','Jun 11','Jun 18','Jun 25'];

    let html = '<div class="roadmap-title">Agent Launch Timeline</div>';
    html += '<div class="roadmap-timeline">';
    html += '<div class="roadmap-chart">';

    // Header: week columns + start/end date anchors
    html += '<div class="timeline-header">';
    // Person column spacer
    html += '<div style="min-width:112px;"></div>';
    html += '<div style="position:relative;flex:1;">';
    for (let w = 1; w <= totalWeeks; w++) {
      const centerPct = ((w - 0.5) / totalWeeks * 100).toFixed(2);
      html += `<div class="week-col-header" style="left: ${centerPct}%;">W${w}</div>`;
    }
    html += '<div class="timeline-marker" style="left: 0%;">Apr 2</div>';
    html += '<div class="timeline-marker" style="left: 100%; transform: translateX(-100%);">Jul 2</div>';
    html += '</div>';
    html += '</div>';

    // Grid rows
    html += '<div class="timeline-grid">';
    agentsData.forEach(personData => {
      html += '<div class="timeline-row">';
      html += `<div class="timeline-person">
        <div class="roadmap-avatar" style="background: ${personData.color};">${getInitials(personData.person)}</div>
        <div class="roadmap-person-name">${escapeHtml(personData.person)}</div>
      </div>`;
      html += '<div class="timeline-track">';

      // Today bar
      html += '<div class="today-bar" style="left: 5.5%;"><div class="today-label">Today</div></div>';

      // Week dividers (12 internal lines)
      for (let w = 1; w < totalWeeks; w++) {
        const pct = (w / totalWeeks * 100).toFixed(2);
        html += `<div class="week-divider" style="left: ${pct}%;"></div>`;
      }

      // Agent dots with tooltip — positioned by actual Slack post date
      const startDate = new Date('2026-04-02');
      const endDate   = new Date('2026-07-02');
      const totalMs   = endDate - startDate;
      personData.agents.forEach(agent => {
        const agentDate = new Date(agent.slackDate || '2026-04-02');
        const position  = Math.max(0, Math.min(98, (agentDate - startDate) / totalMs * 100));
        const config = stageConfig[agent.stage];
        html += `<div class="roadmap-dot-wrap" style="left: ${position}%;">
          <div class="roadmap-dot" style="background: ${config.color}; border-color: ${config.color};"></div>
          <div class="dot-tooltip">
            <span class="dot-tooltip-name">${escapeHtml(agent.name)}</span>
            <span class="dot-tooltip-stage">${config.icon} ${config.label}</span>
          </div>
        </div>`;
      });

      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '</div>';
    html += '</div>';
    return html;
  }

  function renderModal(agentName, personName, personColor, agent) {
    let html = `<div class="modal-header">
      <div class="modal-title-section">
        <div class="modal-title">${escapeHtml(agentName)}</div>
        <div class="modal-person">
          <div class="modal-person-dot" style="background: ${personColor};"></div>
          ${escapeHtml(personName)}
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>`;
    html += '<div class="modal-body">';
    html += renderPipelineTrack(agent.stage, agent.draft);
    const evidenceWithFiles = (agent.evidence || []).filter(ev => ev.attachments && ev.attachments.length > 0);
    if (evidenceWithFiles.length > 0) {
      html += '<div class="timeline-section">';
      html += '<div class="timeline-section-title">Evidence & Progress</div>';
      evidenceWithFiles.forEach(ev => {
        html += '<div class="timeline-item">';
        html += `<div class="timeline-meta">
          <div class="slack-avatar">${getInitials(ev.author)}</div>
          <div class="slack-author-meta">
            <span class="slack-author-name">${escapeHtml(ev.author)}</span>
            <span class="slack-date">${formatDate(ev.date)}</span>
          </div>
        </div>`;
        ev.attachments.forEach(att => {
          const icon = att.type === 'video' ? '🎬' : att.type === 'image' ? '🖼️' : '📎';
          html += `<a href="${ev.permalink ? escapeHtml(ev.permalink) : '#'}" target="_blank" class="file-attachment">
            <div class="file-icon ${att.type}">${icon}</div>
            <div class="file-meta">
              <span class="file-name">${escapeHtml(att.label || att.name)}</span>
              <div class="file-info">${escapeHtml(att.type)}${att.size ? ' · ' + escapeHtml(att.size) : ''}</div>
            </div>
            <div class="file-open-btn">View</div>
          </a>`;
        });
        if (ev.permalink) {
          html += `<div class="slack-footer">
            <a href="${escapeHtml(ev.permalink)}" target="_blank" class="slack-link">View in Slack</a>
          </div>`;
        }
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  function openModal(agentName, personName, personColor, agent) {
    const backdrop = document.getElementById('modalBackdrop');
    const content = document.getElementById('modalContent');
    content.innerHTML = renderModal(agentName, personName, personColor, agent);
    backdrop.classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');

  document.getElementById('modalBackdrop').addEventListener('click', function(e) {
    if (e.target === this) closeModal();

    document.getElementById('metricIdeation').textContent = allAgents.filter(a => a.stage === 'ideation').length;
    document.getElementById('metricBuilding').textContent = allAgents.filter(a => ['drafting','testing'].includes(a.stage)).length;
    document.getElementById('metricLaunched').textContent = allAgents.filter(a => a.stage === 'launched').length;

    document.getElementById('roadmapCard').innerHTML = renderRoadmapChart();
    document.getElementById('peopleGrid').innerHTML = agentsData.map(renderPersonCard).join('');
  }

  init();
</script>

</body>
</html>
