<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Builders Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .header h1 { font-size: 1.6rem; font-weight: 700; color: #f1f5f9; }
  .header h1 span { color: #818cf8; }
  .subtitle { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
  .last-sync { font-size: 0.8rem; color: #475569; background: #1e2330; padding: 6px 12px; border-radius: 20px; }

  /* Metric cards */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .metric { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; padding: 20px; text-align: center; }
  .metric .num { font-size: 2rem; font-weight: 800; }
  .metric .lbl { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
  .metric.total .num { color: #818cf8; }
  .metric.ideation .num { color: #38bdf8; }
  .metric.building .num { color: #fb923c; }
  .metric.launched .num { color: #4ade80; }

  /* Section title */
  .section-title { font-size: 1rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: #1e2d3d; }

  /* Leaderboard */
  .leaderboard { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 16px; padding: 28px; margin-bottom: 32px; }

  /* Podium */
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin-bottom: 32px; }
  .podium-slot { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .podium-slot .medal { font-size: 1.6rem; }
  .podium-slot .p-name { font-size: 0.85rem; font-weight: 600; color: #f1f5f9; }
  .podium-slot .p-pts { font-size: 1.1rem; font-weight: 800; }
  .podium-bar { border-radius: 8px 8px 0 0; width: 80px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-size: 0.7rem; font-weight: 700; }
  .podium-bar { transition: height 0.3s ease; }

  /* Leaderboard table */
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table th { text-align: left; font-size: 0.7rem; color: #475569; text-transform: uppercase; letter-spacing: 0.08em; padding: 0 12px 12px; border-bottom: 1px solid #2d3748; }
  .lb-table th:last-child { text-align: right; }
  .lb-table td { padding: 12px; vertical-align: middle; }
  .lb-table tr:not(:last-child) td { border-bottom: 1px solid #1e2330; }
  .rank-num { font-size: 0.85rem; color: #475569; font-weight: 600; width: 28px; }
  .lb-name { display: flex; align-items: center; gap: 10px; }
  .lb-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .lb-name-text { font-size: 0.9rem; font-weight: 600; }
  .lb-pts { font-weight: 800; font-size: 1rem; text-align: right; }
  .lb-bar-wrap { width: 120px; }
  .lb-bar { height: 6px; border-radius: 3px; background: #2d3748; overflow: hidden; }
  .lb-bar-fill { height: 100%; border-radius: 3px; }
  .new-badge { font-size: 0.65rem; background: #14532d; color: #4ade80; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }

  /* Stage pips with tooltip */
  .pips { display: flex; gap: 6px; position: relative; }
  .pip { font-size: 0.72rem; background: #1e2330; border: 1px solid #2d3748; border-radius: 6px; padding: 3px 7px; cursor: default; position: relative; white-space: nowrap; }
  .pip:hover .pip-tooltip { display: block; }
  .pip-tooltip {
    display: none;
    position: fixed;
    z-index: 9999;
    background: #0f1117;
    border: 1px solid #3d4a5c;
    border-radius: 10px;
    padding: 12px 14px;
    min-width: 180px;
    max-width: 240px;
    max-height: 240px;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    pointer-events: none;
  }
  .pip-tooltip-title { font-size: 0.7rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .pip-tooltip-item { font-size: 0.8rem; color: #cbd5e1; padding: 3px 0; border-bottom: 1px solid #1e2330; }
  .pip-tooltip-item:last-child { border-bottom: none; }

  /* Person cards */
  .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
  .card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 14px; padding: 20px; }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .card-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; color: #fff; flex-shrink: 0; }
  .card-name { font-size: 0.95rem; font-weight: 700; color: #f1f5f9; }
  .card-count { font-size: 0.75rem; color: #64748b; }
  .agent-list { display: flex; flex-direction: column; gap: 8px; }
  .agent-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px 10px; background: #0f1117; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
  .agent-row:hover { background: #1e2330; }
  .agent-row.has-evidence { border-left: 2px solid; }
  .agent-name { font-size: 0.82rem; color: #cbd5e1; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .stage-badge { font-size: 0.68rem; padding: 2px 7px; border-radius: 4px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .stage-ideation { background: #0f2d40; color: #38bdf8; }
  .stage-drafting { background: #2d1810; color: #fb923c; }
  .stage-testing { background: #1a2d10; color: #86efac; }
  .stage-launched { background: #14210a; color: #4ade80; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 16px; width: 100%; max-width: 560px; max-height: 80vh; display: flex; flex-direction: column; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid #2d3748; flex-shrink: 0; }
  .modal-title { font-size: 1rem; font-weight: 700; color: #f1f5f9; }
  .modal-stage { font-size: 0.75rem; padding: 3px 8px; border-radius: 5px; margin-left: 10px; }
  .modal-close { background: none; border: none; color: #64748b; font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
  .modal-close:hover { background: #2d3748; color: #f1f5f9; }
  .modal-body { overflow-y: auto; padding: 20px 24px; flex: 1; }
  .no-evidence { text-align: center; color: #475569; font-size: 0.85rem; padding: 32px 0; }
  .evidence-item { background: #0f1117; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
  .ev-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .ev-author { font-size: 0.8rem; font-weight: 600; color: #94a3b8; }
  .ev-date { font-size: 0.75rem; color: #475569; }
  .ev-text { font-size: 0.83rem; color: #cbd5e1; margin-bottom: 10px; line-height: 1.5; }
  .ev-files { display: flex; flex-direction: column; gap: 6px; }
  .ev-file { display: flex; align-items: center; justify-content: space-between; background: #1a1f2e; border: 1px solid #2d3748; border-radius: 7px; padding: 8px 12px; }

/* ---------- helpers ---------- */
const STAGE_SCORE = { launched: 100, testing: 50, drafting: { 3: 30, 2: 20, 1: 10, undefined: 10 }, ideation: 2 };
const STAGE_ICON = { launched: '🚀', testing: '🧪', drafting: '✏️', ideation: '💡' };
const STAGE_LABEL = { launched: 'Launched', testing: 'Testing', drafting: 'Drafting', ideation: 'Ideation' };

function scoreAgent(a) {
  if (a.stage === 'launched') return 100;
  if (a.stage === 'testing') return 50;
  if (a.stage === 'drafting') return STAGE_SCORE.drafting[a.draft] ?? 10;
  return 2;
}

function scoreBuilder(b) { return b.agents.reduce((s, a) => s + scoreAgent(a), 0); }

function isRecent(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr), now = new Date();
  return (now - d) / 86400000 <= 7;
}

function stageClass(s) { return 'stage-' + s; }

function stageByType(agents, stage) { return agents.filter(a => a.stage === stage).map(a => a.name); }

/* ---------- metrics ---------- */
function renderMetrics() {
  const all = agentsData.flatMap(b => b.agents);
  const m = document.getElementById('metrics');
  m.innerHTML = `
    <div class="metric total"><div class="num">${all.length}</div><div class="lbl">Total Agents</div></div>
    <div class="metric ideation"><div class="num">${all.filter(a => a.stage === 'ideation').length}</div><div class="lbl">Ideation</div></div>
    <div class="metric building"><div class="num">${all.filter(a => ['drafting','testing'].includes(a.stage)).length}</div><div class="lbl">Building</div></div>
    <div class="metric launched"><div class="num">${all.filter(a => a.stage === 'launched').length}</div><div class="lbl">Launched</div></div>`;
}

/* ---------- stage pips with tooltip ---------- */
function renderPips(b, parentEl) {
  const stages = ['launched', 'testing', 'drafting', 'ideation'];
  const pipsEl = parentEl;
  stages.forEach(s => {
    const names = stageByType(b.agents, s);
    if (!names.length) return;
    const pip = document.createElement('span');
    pip.className = 'pip';
    pip.textContent = `${STAGE_ICON[s]} ${names.length}`;
    const tooltip = document.createElement('div');
    tooltip.className = 'pip-tooltip';
    tooltip.innerHTML = `<div class="pip-tooltip-title">${STAGE_ICON[s]} ${STAGE_LABEL[s]}</div>` +
      names.map(n => `<div class="pip-tooltip-item">• ${n}</div>`).join('');
    pip.appendChild(tooltip);
    // position tooltip on hover via JS to avoid clipping
    pip.addEventListener('mouseenter', function(e) {
      const rect = pip.getBoundingClientRect();
      tooltip.style.left = Math.min(rect.left, window.innerWidth - 250) + 'px';
      tooltip.style.top = (rect.bottom + 6) + 'px';
    });
    pipsEl.appendChild(pip);
  });
}

/* ---------- leaderboard ---------- */
function renderLeaderboard() {
  const sorted = [...agentsData].map(b => ({ ...b, score: scoreBuilder(b) })).sort((a, b) => b.score - a.score);
  const maxScore = sorted[0].score;

  // Podium (top 3)
  const podiumEl = document.getElementById('podium');
  const medals = ['🥇', '🥈', '🥉'];
  const colors = ['#b8860b', '#3b82f6', '#6b7280'];
  // Render order: silver (left), gold (centre), bronze (right)
  // Heights and colours are set by rank (i), not DOM position
  const barHeights = [90, 65, 45]; // rank 0=gold tallest, 1=silver, 2=bronze
  const barGradients = [
    'linear-gradient(180deg,#c0a020 0%,#8b6914 100%)',  // gold
    'linear-gradient(180deg,#94a3b8 0%,#475569 100%)',  // silver
    'linear-gradient(180deg,#b7640a 0%,#7c3d04 100%)'   // bronze
  ];
  const order = [1, 0, 2]; // silver left, gold centre, bronze right
  order.forEach(i => {
    if (!sorted[i]) return;
    const b = sorted[i];
    const slot = document.createElement('div');
    slot.className = 'podium-slot';
    slot.innerHTML = `
      <div class="medal">${medals[i]}</div>
      <div class="p-name">${b.name.split(' ')[0]}</div>
      <div class="p-pts" style="color:${b.color}">${b.score} pts</div>
      <div class="podium-bar" style="height:${barHeights[i]}px;background:${barGradients[i]}"></div>`;
    podiumEl.appendChild(slot);
  });

  // Table
  const tbody = document.getElementById('lbBody');
  sorted.forEach((b, idx) => {
    const recent = b.agents.some(a => isRecent(a.slackDate));
    const pct = Math.round((b.score / maxScore) * 100);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="rank-num">${idx + 1}</td>
      <td>
        <div class="lb-name">
          <div class="lb-dot" style="background:${b.color}"></div>
          <span class="lb-name-text">${b.name}</span>
          ${recent ? '<span class="new-badge">↑ new</span>' : ''}
        </div>
      </td>
      <td><div class="pips" id="pips-lb-${idx}"></div></td>
      <td class="lb-bar-wrap"><div class="lb-bar"><div class="lb-bar-fill" style="width:${pct}%;background:${b.color}"></div></div></td>
      <td class="lb-pts" style="color:${b.color}">${b.score}</td>`;
    tbody.appendChild(tr);
    renderPips(b, tr.querySelector(`#pips-lb-${idx}`));
  });
}

/* ---------- person cards ---------- */
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  agentsData.forEach((b, bi) => {
    const card = document.createElement('div');
    card.className = 'card';
    const total = b.agents.length;
    const active = b.agents.filter(a => a.stage !== 'ideation').length;
    card.innerHTML = `
      <div class="card-header">
        <div class="card-avatar" style="background:${b.color}">${b.name.split(' ').map(w => w[0]).join('').slice(0,2)}</div>
        <div><div class="card-name">${b.name}</div><div class="card-count">${active} active · ${total} total</div></div>
      </div>
      <div class="agent-list" id="agents-${bi}"></div>`;
    grid.appendChild(card);
    const listEl = card.querySelector(`#agents-${bi}`);
    b.agents.forEach((a, ai) => {
      const row = document.createElement('div');
      row.className = 'agent-row' + (a.evidence.length ? ' has-evidence' : '');
      if (a.evidence.length) row.style.borderColor = b.color;
      const draftLabel = a.stage === 'drafting' && a.draft ? ` D${a.draft}` : '';
      row.innerHTML = `
        <span class="agent-name" title="${a.name}">${a.name}</span>
        <span class="stage-badge ${stageClass(a.stage)}">${STAGE_ICON[a.stage]} ${STAGE_LABEL[a.stage]}${draftLabel}</span>`;
      if (a.evidence.length) {
        row.addEventListener('click', () => openModal(b, a));
        row.title = 'Click to view evidence';
      }
      listEl.appendChild(row);
    });
  });
}

/* ---------- modal ---------- */
let modalOpen = false;
function openModal(b, agent) {
  document.getElementById('modalTitle').textContent = agent.name;
  const st = document.getElementById('modalStage');
  st.textContent = `${STAGE_ICON[agent.stage]} ${STAGE_LABEL[agent.stage]}${agent.stage === 'drafting' && agent.draft ? ' D' + agent.draft : ''}`;
  st.className = `modal-stage stage-badge ${stageClass(agent.stage)}`;

  const body = document.getElementById('modalBody');
  const withFiles = agent.evidence.filter(ev => ev.attachments && ev.attachments.length);
  if (!withFiles.length) {
    body.innerHTML = '<div class="no-evidence">No screenshot evidence yet.</div>';
  } else {
    body.innerHTML = withFiles.map(ev => `
      <div class="evidence-item">
        <div class="ev-header">
          <span class="ev-author">${ev.author}</span>
          <span class="ev-date">${ev.date}</span>
        </div>
        <div class="ev-text">${ev.text}</div>
        <div class="ev-files">
          ${ev.attachments.map(f => `
            <div class="ev-file">
              <div class="ev-file-info">
                <span class="ev-file-icon">${f.type === 'image' ? '🖼️' : f.type === 'video' ? '🎥' : '📄'}</span>
                <div><div class="ev-file-name">${f.label || f.name}</div><div class="ev-file-size">${f.size}</div></div>
              </div>
              <a href="${ev.permalink}" target="_blank" class="ev-file-link">View →</a>
            </div>`).join('')}
        </div>
      </div>`).join('');
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ---------- init ---------- */
renderMetrics();
renderLeaderboard();
renderCards();
</script>
</body>
</html>
